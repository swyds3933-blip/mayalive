<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Maya Live</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body style="background:#000; color:#fff; text-align:center;">
    <h1>منصة مايا لايف</h1>
    <button id="loginBtn" onclick="initApp()">دخول المنصة</button>
    <div id="content" style="display:none;">
        <p>أهلاً بك في المنصة</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyArWDVZm-6sSJQxeX8lbMIvwVefpZ_zAnE",
            authDomain: "maya-live-e7376.firebaseapp.com",
            projectId: "maya-live-e7376",
            storageBucket: "maya-live-e7376.firebasestorage.app",
            messagingSenderId: "294517094693",
            appId: "1:294517094693:web:6215111f6fc5c5ca8e82cc"
        };
        firebase.initializeApp(firebaseConfig);

        window.initApp = function() {
            firebase.auth().signInAnonymously().then(() => {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                alert("تم الدخول بنجاح!");
            });
        };
    </script>
</body>
</html>
