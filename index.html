<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Maya Live | المنصة الرسمية</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="main-app" style="text-align: center; padding: 20px;">
        <h1>Maya Live - لوحة الإدارة</h1>
        <button id="loginBtn" onclick="initLogin()">دخول المؤسس</button>
        <div id="admin-panel" style="display:none; border: 2px solid green; padding: 10px;">
            <h2>أهلاً بك يا مؤسس</h2>
            <div id="users-container">جاري تحميل بيانات المستخدمين...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyArWDVZm-6sSJQxeX8lbMIvwVefpZ_zAnE",
            authDomain: "maya-live-e7376.firebaseapp.com",
            projectId: "maya-live-e7376",
            storageBucket: "maya-live-e7376.firebasestorage.app",
            messagingSenderId: "294517094693",
            appId: "1:294517094693:web:6215111f6fc5c5ca8e82cc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.initLogin = function() {
            firebase.auth().signInAnonymously().then(() => {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadUsers();
            });
        };

        function loadUsers() {
            db.collection("users").onSnapshot(snapshot => {
                let html = "<h3>قائمة المستخدمين:</h3>";
                snapshot.forEach(doc => {
                    html += `<p>UID: ${doc.id.slice(0,8)}... | الرصيد: ${doc.data().balance || 0} 
                             <button onclick="addCoins('${doc.id}')">إضافة رصيد</button></p>`;
                });
                document.getElementById('users-container').innerHTML = html;
            });
        }

        window.addCoins = function(uid) {
            db.collection("users").doc(uid).set({ balance: firebase.firestore.FieldValue.increment(1000) }, { merge: true });
        };
    </script>
</body>
</html>
