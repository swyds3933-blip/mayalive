<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Maya Live Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="main-app" style="text-align: center; padding: 20px;">
        <h1>Maya Live - النظام المتكامل</h1>
        <button id="loginBtn" onclick="initLogin()">دخول المنصة</button>
        <div id="user-info" style="display:none;">
            <p>أهلاً بك يا مؤسس</p>
            <button onclick="adminAction()">لوحة التحكم</button>
        </div>
    </div>

    <script>
        // التهيئة المباشرة
        const firebaseConfig = {
            apiKey: "AIzaSyArWDVZm-6sSJQxeX8lbMIvwVefpZ_zAnE",
            authDomain: "maya-live-e7376.firebaseapp.com",
            projectId: "maya-live-e7376",
            storageBucket: "maya-live-e7376.firebasestorage.app",
            messagingSenderId: "294517094693",
            appId: "1:294517094693:web:6215111f6fc5c5ca8e82cc"
        };
        firebase.initializeApp(firebaseConfig);

        // الدالة المعرفة بشكل صحيح داخل الـ window
        window.initLogin = function() {
            firebase.auth().signInAnonymously()
            .then(() => {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('user-info').style.display = 'block';
                alert("تم الدخول بنجاح!");
            })
            .catch((err) => {
                alert("خطأ: " + err.message);
            });
        };

        window.adminAction = function() {
            alert("تم تفعيل صلاحيات المؤسس!");
        };
    </script>
</body>
</html>
